<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="K_M_Cart — Fresh Grocery Store. Shop smart, shop fast with premium quality groceries delivered to your doorstep." />
    <meta name="theme-color" content="#7C8BF2" />
    <title>K_M_Cart — Fresh Grocery</title>

    <!-- Preload Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Loading Screen Styles (inline for instant render) -->
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f0f0ff 0%, #ffffff 40%, #f5f0ff 100%);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      #splash-screen.hide {
        opacity: 0;
        visibility: hidden;
      }

      .splash-logo {
        width: 80px;
        height: 80px;
        border-radius: 24px;
        object-fit: cover;
        animation: splashPulse 2s ease-in-out infinite;
        box-shadow: 0 20px 60px rgba(124, 139, 242, 0.3);
      }

      .splash-brand {
        margin-top: 24px;
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(135deg, #7C8BF2, #5A6BE0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
      }

      .splash-tagline {
        margin-top: 8px;
        font-size: 14px;
        color: #9ca3af;
        font-weight: 500;
        letter-spacing: 0.5px;
      }

      .splash-loader {
        margin-top: 40px;
        display: flex;
        gap: 8px;
      }
      .splash-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(135deg, #7C8BF2, #5A6BE0);
        animation: splashBounce 1.4s ease-in-out infinite both;
      }
      .splash-dot:nth-child(1) { animation-delay: -0.32s; }
      .splash-dot:nth-child(2) { animation-delay: -0.16s; }
      .splash-dot:nth-child(3) { animation-delay: 0s; }

      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes splashBounce {
        0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Splash / Loading Screen -->
    <div id="splash-screen">
      <img src="/logo.png" alt="K_M_Cart" class="splash-logo" />
      <div class="splash-brand">K_M_Cart</div>
      <div class="splash-tagline">Fresh Grocery. Delivered Fast.</div>
      <div class="splash-loader">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <!-- React App Root -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide splash after React mounts -->
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const splash = document.getElementById('splash-screen');
        // Give React time to mount, then fade out
        const hideSplash = () => {
          if (splash) {
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 500);
          }
        };
        // Hide after 1.5s minimum (for branding) or when React renders
        setTimeout(hideSplash, 1800);
      });
    </script>
  </body>
</html>
